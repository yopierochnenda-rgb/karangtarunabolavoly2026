<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT CUP 2026 - FINAL FIX</title>
    <style>
        :root { --red: #fe2c55; --bg: #0a0a0a; --card: #161616; --gold: #f1c40f; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: sans-serif; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Admin Panel */
        #admin-panel { display: none; background: #222; padding: 15px; border-radius: 12px; border: 1px solid var(--red); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #333; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--red); color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        /* Layout */
        .section-title { color: var(--gold); border-left: 4px solid var(--red); padding-left: 10px; margin: 25px 0 10px; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .match-card { background: var(--card); margin-bottom: 10px; padding: 15px; border-radius: 12px; border-left: 4px solid var(--red); }
        .match-teams { display: flex; justify-content: space-between; align-items: center; text-align: center; }
        .score-box { background: #000; padding: 8px 12px; border-radius: 8px; color: var(--red); font-weight: 900; font-size: 20px; border: 1px solid #333; min-width: 40px; }
        .gugur-box { background: linear-gradient(145deg, #1a1a1a, #222); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; margin-bottom: 10px; }
        .card { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .pts-box { background: rgba(254, 44, 85, 0.1); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--red); color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">🏆 RT CUP 2026</h2>
    <div onclick="toggleAdmin()" style="cursor:pointer; font-size:22px;">⚙️</div>
</div>

<div id="admin-panel">
    <div id="pass-area">
        <input type="password" id="passInput" placeholder="Kode Akses...">
        <button class="btn-save" onclick="cekPassword()">BUKA ADMIN</button>
    </div>
    <div id="form-admin" style="display:none;">
        <h4 style="margin:0; color:var(--red);">UPDATE SKOR JADWAL</h4>
        <select id="selJadwal"></select>
        <div style="display:flex; gap:10px;"><input type="number" id="s1" placeholder="S1"><input type="number" id="s2" placeholder="S2"></div>
        <button class="btn-save" onclick="simpanSkor()">SIMPAN SKOR</button>
        <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
        <h4 style="margin:0; color:var(--gold);">UPDATE BABAK GUGUR</h4>
        <select id="pilihBabak">
            <option value="S1">SEMI FINAL 1</option>
            <option value="S2">SEMI FINAL 2</option>
            <option value="S3">JUARA 3</option>
            <option value="S4">GRAND FINAL</option>
        </select>
        <input type="text" id="inputLawan" placeholder="Nama Tim (RT 01 vs RT 02)">
        <input type="text" id="inputWaktu" placeholder="Waktu (Minggu, 16.00)">
        <button class="btn-save" style="background:var(--gold); color:black;" onclick="simpanGugur()">UPDATE BAGAN</button>
        <button onclick="toggleAdmin()" style="background:#444; width:100%; margin-top:10px; border:none; color:white; padding:8px; border-radius:8px;">TUTUP</button>
    </div>
</div>

<div class="section-title">🏆 BABAK GUGUR</div>
<div style="display:flex; gap:10px; margin-bottom:10px;">
    <div class="gugur-box" style="flex:1;">
        <small style="color:var(--gold)">SEMI FINAL 1</small>
        <div id="txt-S1" style="font-weight:bold; margin:5px 0;">-</div>
        <div id="jam-S1" style="font-size:10px; color:#888;">-</div>
    </div>
    <div class="gugur-box" style="flex:1;">
        <small style="color:var(--gold)">SEMI FINAL 2</small>
        <div id="txt-S2" style="font-weight:bold; margin:5px 0;">-</div>
        <div id="jam-S2" style="font-size:10px; color:#888;">-</div>
    </div>
</div>
<div class="gugur-box" style="border:2px solid var(--gold)">
    <b style="color:var(--gold)">🏆 GRAND FINAL 🏆</b>
    <div id="txt-S4" style="font-size:18px; font-weight:bold; margin:10px 0;">-</div>
    <div id="jam-S4" style="font-size:12px; color:#888;">-</div>
</div>

<div class="section-title">📅 JADWAL PERTANDINGAN</div>
<div id="jadwal-area">Memuat...</div>

<div class="section-title">📊 KLASEMEN</div>
<div id="klasemen-area">Memuat...</div>

<script>
    // MASUKKAN LINK /EXEC TERBARU DISINI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxXvIzWPnMmGDkjP67QiM75BvA8GNtPwFmFXtc_jV_nuWFahf_M7QinY7dF-JrtvBQe/exec';
    const PASS = "2026";

    function toggleAdmin() {
        var x = document.getElementById("admin-panel");
        x.style.display = (x.style.display === "none") ? "block" : "none";
    }

    function cekPassword() {
        if(document.getElementById("passInput").value === PASS) {
            document.getElementById("pass-area").style.display = "none";
            document.getElementById("form-admin").style.display = "block";
        } else { alert("Salah!"); }
    }

    function muatData() {
        fetch(scriptURL).then(res => res.json()).then(res => {
            // Render Jadwal
            let hJadwal = ''; let opsi = '<option value="">-- Pilih Partai --</option>';
            res.jadwal.slice(1).forEach(r => {
                if(!r[1]) return;
                let skor = (r[4] === "" && r[5] === "") ? "VS" : `${r[4]} - ${r[5]}`;
                hJadwal += `<div class="match-card"><div class="match-teams"><b>${r[3]}</b><div class="score-box">${skor}</div><b>${r[6]}</b></div></div>`;
                opsi += `<option value="${r[0]}">${r[3]} vs ${r[6]}</option>`;
            });
            document.getElementById('jadwal-area').innerHTML = hJadwal;
            document.getElementById('selJadwal').innerHTML = opsi;

            // Render Klasemen
            let hKlas = '';
            res.klasemen.slice(1).forEach(r => {
                if(!r[0] || r[0] === "NAMA RT") return;
                hKlas += `<div class="card"><b>${r[0]}</b><div class="pts-box">${r[4]} PTS</div></div>`;
            });
            document.getElementById('klasemen-area').innerHTML = hKlas;

            // Render Gugur
            const getG = (id) => res.gugur.find(b => b[0] == id);
            let s1=getG("S1"), s2=getG("S2"), s4=getG("S4");
            if(s1){ document.getElementById('txt-S1').innerText=s1[2]||"-"; document.getElementById('jam-S1').innerText=s1[3]||"-"; }
            if(s2){ document.getElementById('txt-S2').innerText=s2[2]||"-"; document.getElementById('jam-S2').innerText=s2[3]||"-"; }
            if(s4){ document.getElementById('txt-S4').innerText=s4[2]||"-"; document.getElementById('jam-S4').innerText=s4[3]||"-"; }
        });
    }

    function simpanSkor() {
        const payload = { id: document.getElementById('selJadwal').value, s1: document.getElementById('s1').value, s2: document.getElementById('s2').value };
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).then(() => { alert("Terkirim!"); muatData(); });
    }

    function simpanGugur() {
        const payload = { tipe: "GUGUR", id: document.getElementById('pilihBabak').value, lawan: document.getElementById('inputLawan').value, waktu: document.getElementById('inputWaktu').value };
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).then(() => { alert("Terkirim!"); muatData(); });
    }

    window.onload = muatData;
</script>
</body>
</html>
