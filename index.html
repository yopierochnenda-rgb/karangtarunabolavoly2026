<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RT CUP 2026 - DIGITAL BOARD</title>
  <style>
    :root { --red: #fe2c55; --bg: #0a0a0a; --card: #161616; --gold: #f1c40f; --white: #ffffff; }
    body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; margin: 0; line-height: 1.5; }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 20px; }
    .header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }

    /* Admin Panel Styling */
    #admin-panel { display: none; background: #222; padding: 15px; border-radius: 12px; border: 1px solid var(--red); margin-bottom: 25px; box-shadow: 0 4px 15px rgba(254, 44, 85, 0.2); }
    input, select { width: 100%; padding: 12px; margin: 8px 0; background: #333; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .btn-save { width: 100%; padding: 12px; background: var(--red); color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 5px; transition: 0.3s; }
    .btn-save:hover { opacity: 0.8; }

    .section-title { color: var(--gold); border-left: 4px solid var(--red); padding-left: 10px; margin: 30px 0 15px; font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
    
    /* Match & Klasemen Cards */
    .match-card { background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 12px; border-left: 4px solid var(--red); transition: 0.3s; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; text-align: center; gap: 10px; }
    .score-box { background: #000; padding: 8px 15px; border-radius: 8px; color: var(--red); font-weight: 900; font-size: 20px; border: 1px solid #333; min-width: 50px; }
    
    .card { background: var(--card); padding: 12px 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    .pts-box { text-align: center; background: rgba(254, 44, 85, 0.1); padding: 8px; border-radius: 8px; min-width: 45px; border: 1px solid var(--red); color: var(--red); font-weight: bold; }
    
    /* Gugur Area Styling */
    .gugur-box { background: linear-gradient(145deg, #1a1a1a, #222); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; margin-bottom: 15px; }
    .semi-container { display: flex; gap: 10px; margin-bottom: 10px; }
    .final-box { border: 2px solid var(--gold); background: rgba(241, 196, 15, 0.05); }
    .final-box h3 { color: var(--gold); margin: 0 0 10px; font-size: 16px; }

    footer { text-align: center; font-size: 10px; color: #555; margin-top: 40px; padding-bottom: 20px; }
  </style>
</head>
<body>

  <div class="header">
    <h2>🏆 RT CUP 2026</h2>
    <div onclick="toggleAdmin()" style="cursor:pointer; font-size:22px; filter: grayscale(1);">⚙️</div>
  </div>

  <div id="admin-panel">
    <div id="pass-area">
        <input type="password" id="passInput" placeholder="Masukkan Kode Akses...">
        <button class="btn-save" onclick="cekPassword()">BUKA PANEL</button>
    </div>
    <div id="form-admin" style="display:none;">
        <h4 style="margin:0 0 10px; color:var(--red);">⚽ UPDATE SKOR PERTANDINGAN</h4>
        <select id="selJadwal"></select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="s1" placeholder="Skor Kiri">
            <input type="number" id="s2" placeholder="Skor Kanan">
        </div>
        <button class="btn-save" onclick="simpanSkor()">UPDATE SKOR</button>
        
        <hr style="border:0; border-top:1px solid #444; margin:20px 0;">
        
        <h4 style="margin:0 0 10px; color:var(--gold);">🏅 SET BABAK GUGUR (MANUAL)</h4>
        <select id="pilihBabak">
            <option value="S1">SEMI FINAL 1</option>
            <option value="S2">SEMI FINAL 2</option>
            <option value="S3">PEREBUTAN JUARA 3</option>
            <option value="S4">GRAND FINAL (1/2)</option>
        </select>
        <input type="text" id="inputLawan" placeholder="Contoh: RT 01 VS RT 05">
        <input type="text" id="inputWaktu" placeholder="Contoh: Minggu, 14.00 WIB">
        <button class="btn-save" style="background:var(--gold); color:black;" onclick="simpanGugur()">UPDATE BAGAN</button>
        <button onclick="toggleAdmin()" style="background:#444; width:100%; margin-top:15px; border:none; color:white; padding:10px; border-radius:8px; cursor:pointer;">TUTUP PANEL</button>
    </div>
  </div>

  <div class="section-title">🏆 BABAK GUGUR</div>
  <div id="gugur-area">
    <div class="semi-container">
        <div class="gugur-box" style="flex:1;">
            <div style="font-size:10px; color:var(--gold); font-weight:bold;">SEMI FINAL 1</div>
            <div id="txt-S1" style="font-size:12px; font-weight:bold; margin:8px 0; min-height:18px;">Memuat...</div>
            <div id="jam-S1" style="font-size:9px; color:#888;">-</div>
        </div>
        <div class="gugur-box" style="flex:1;">
            <div style="font-size:10px; color:var(--gold); font-weight:bold;">SEMI FINAL 2</div>
            <div id="txt-S2" style="font-size:12px; font-weight:bold; margin:8px 0; min-height:18px;">Memuat...</div>
            <div id="jam-S2" style="font-size:9px; color:#888;">-</div>
        </div>
    </div>
    <div class="gugur-box" style="border-color: #444;">
        <div style="font-size:10px; color:#aaa; font-weight:bold;">PEREBUTAN JUARA 3</div>
        <div id="txt-S3" style="font-size:14px; font-weight:bold; margin:8px 0;">-</div>
        <div id="jam-S3" style="font-size:10px; color:#666;">-</div>
    </div>
    <div class="gugur-box final-box">
        <h3>🏆 GRAND FINAL 🏆</h3>
        <div id="txt-S4" style="font-size:18px; font-weight:bold; margin:10px 0; color:white;">-</div>
        <div id="jam-S4" style="font-size:12px; color:var(--gold);">-</div>
    </div>
  </div>

  <div class="section-title">📅 JADWAL & HASIL GRUP</div>
  <div id="jadwal-area">Memuat Jadwal...</div>

  <div class="section-title">📊 KLASEMEN SEMENTARA</div>
  <div id="klasemen-area">Memuat Klasemen...</div>

  <footer>RT CUP 2026 Digital Board v2.0</footer>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyStU7aoHcVcjs5rYtBfja0YRBoTnspSQxnzLP_ZhAhOnX6at07-WveNnUEvnL_JKSq/exec';
    const PASS = "2026"; 

    function toggleAdmin() {
        var x = document.getElementById("admin-panel");
        x.style.display = (x.style.display === "none" || x.style.display === "") ? "block" : "none";
        document.getElementById("passInput").value = "";
    }

    function cekPassword() {
        if(document.getElementById("passInput").value === PASS) {
            document.getElementById("pass-area").style.display = "none";
            document.getElementById("form-admin").style.display = "block";
        } else { alert("Maaf, Kode Akses Salah!"); }
    }

    function muatData() {
      fetch(scriptURL).then(res => res.json()).then(res => {
          // RENDER JADWAL
          let hJadwal = ''; let opsi = '<option value="">-- Pilih Partai --</option>';
          if(res.jadwal && res.jadwal.length > 1) {
            res.jadwal.slice(1).forEach(r => {
              if(!r[1]) return;
              let skor = (r[4] === "" && r[5] === "") ? "VS" : `${r[4]} - ${r[5]}`;
              hJadwal += `<div class="match-card">
                            <div style="font-size:10px; color:#888; margin-bottom:5px;">${r[1]} | ${r[2]}</div>
                            <div class="match-teams">
                                <div style="flex:1; font-weight:bold; font-size:13px;">${r[3]}</div>
                                <div class="score-box">${skor}</div>
                                <div style="flex:1; font-weight:bold; font-size:13px;">${r[6]}</div>
                            </div>
                          </div>`;
              opsi += `<option value="${r[0]}">${r[3]} vs ${r[6]}</option>`;
            });
          }
          document.getElementById('jadwal-area').innerHTML = hJadwal || "Jadwal belum tersedia.";
          document.getElementById('selJadwal').innerHTML = opsi;

          // RENDER KLASEMEN
          let hKlasA = '<div style="color:var(--gold); font-size:11px; margin-bottom:8px; font-weight:bold;">GRUP A</div>';
          let hKlasB = '<div style="color:var(--gold); font-size:11px; margin:20px 0 8px; font-weight:bold;">GRUP B</div>';
          let isB = false;
          if(res.klasemen && res.klasemen.length > 1) {
            res.klasemen.slice(1).forEach(r => {
              if(r[0] === "NAMA RT") { isB = true; return; }
              if(!r[0]) return;
              let item = `<div class="card">
                            <div><b style="font-size:13px;">${r[0]}</b><br><small style="color:#888">M:${r[1]} | MG:${r[2]} | K:${r[3]}</small></div>
                            <div class="pts-box">${r[4]} <small style="font-size:8px;">PTS</small></div>
                          </div>`;
              if(isB) hKlasB += item; else hKlasA += item;
            });
          }
          document.getElementById('klasemen-area').innerHTML = hKlasA + hKlasB;

          // RENDER BABAK GUGUR (ANTI-STRIP)
          if(res.gugur && res.gugur.length > 0) {
            const getG = (id) => res.gugur.find(baris => baris[0] == id);
            let s1 = getG("S1"); let s2 = getG("S2"); let s3 = getG("S3"); let s4 = getG("S4");

            if(s1) { document.getElementById('txt-S1').innerText = s1[2] || "-"; document.getElementById('jam-S1').innerText = s1[3] || "-"; }
            if(s2) { document.getElementById('txt-S2').innerText = s2[2] || "-"; document.getElementById('jam-S2').innerText = s2[3] || "-"; }
            if(s3) { document.getElementById('txt-S3').innerText = s3[2] || "-"; document.getElementById('jam-S3').innerText = s3[3] || "-"; }
            if(s4) { document.getElementById('txt-S4').innerText = s4[2] || "-"; document.getElementById('jam-S4').innerText = s4[3] || "-"; }
          }
      }).catch(err => {
          console.error("Error muat data:", err);
      });
    }

    function simpanSkor() {
        const id = document.getElementById('selJadwal').value;
        const s1 = document.getElementById('s1').value;
        const s2 = document.getElementById('s2').value;
        if(!id) return alert("Pilih pertandingan dulu!");
        if(s1 === "" || s2 === "") return alert("Isi skor kedua tim!");
        
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ id, s1, s2 }) })
        .then(() => { alert("Skor Berhasil Disimpan!"); muatData(); document.getElementById('s1').value=''; document.getElementById('s2').value=''; });
    }

    function simpanGugur() {
        const id = document.getElementById('pilihBabak').value;
        const lawan = document.getElementById('inputLawan').value;
        const waktu = document.getElementById('inputWaktu').value;
        if(!lawan) return alert("Isi nama tim yang bertanding!");
        
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipe: "GUGUR", id, lawan, waktu }) })
        .then(() => { alert("Bagan Gugur Diperbarui!"); muatData(); document.getElementById('inputLawan').value=''; document.getElementById('inputWaktu').value=''; });
    }

    window.onload = muatData;
    setInterval(muatData, 60000); // Auto update tiap menit
  </script>
</body>
</html>
